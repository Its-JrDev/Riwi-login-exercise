<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>MyApp | Login</title>
  </head>
  <body class="login-page">
    <main class="login-page__content">
      
      <section class="login-card">
        <h2 class="login-card__title">Sign In</h2>
        
        <form id="loginForm" class="login-form">
          
          <div class="login-form__group">
            <label for="userEmail" class="login-form__label">Email Address</label>
            <input 
              type="email" 
              id="userEmail" 
              class="login-form__input" 
              required
            >
          </div>

          <div class="login-form__group">
            <label for="userPassword" class="login-form__label">Password</label>
            <input 
              type="password" 
              id="userPassword" 
              class="login-form__input" 
              required
            >
          </div>

          <!-- Message box using BEM modifiers -->
          <div id="message-box" class="status-message"></div>

          <button type="submit" class="login-form__button">
            Log in
          </button>
          
          <a href="#" class="login-form__link">Forgot password?</a>
          
        </form>
      </section>

    </main>
    <script src="script.js"></script>
  </body>
</html>
